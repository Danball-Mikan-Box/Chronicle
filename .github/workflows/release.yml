name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # CI — verify compilation on every push / PR
  # ---------------------------------------------------------------------------

  build-linux:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-linux
          path: target/release/chronicle

  build-windows:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-windows
          path: target/release/chronicle.exe

  build-macos-x86_64:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/chronicle

  build-macos-aarch64:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/chronicle

  create-macos-universal:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    needs: [build-macos-x86_64, build-macos-aarch64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: chronicle-x86_64-apple-darwin
          path: build/x86_64
      - uses: actions/download-artifact@v4
        with:
          name: chronicle-aarch64-apple-darwin
          path: build/aarch64
      - name: Create universal binary
        run: |
          mkdir -p "Chronicle.app/Contents/MacOS"
          mkdir -p "Chronicle.app/Contents/Resources"
          lipo -create build/x86_64/chronicle build/aarch64/chronicle \
            -output "Chronicle.app/Contents/MacOS/chronicle"
          chmod +x "Chronicle.app/Contents/MacOS/chronicle"
          cp Chronicle.png "Chronicle.app/Contents/Resources/"
      - name: Create Info.plist
        run: |
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>CFBundleExecutable</key>'
            echo '  <string>chronicle</string>'
            echo '  <key>CFBundleIdentifier</key>'
            echo '  <string>com.chronicle.app</string>'
            echo '  <key>CFBundleName</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>CFBundleDisplayName</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>CFBundleVersion</key>'
            echo '  <string>${{ github.ref_name }}</string>'
            echo '  <key>CFBundleShortVersionString</key>'
            echo '  <string>0.1.0</string>'
            echo '  <key>CFBundlePackageType</key>'
            echo '  <string>APPL</string>'
            echo '  <key>LSMinimumSystemVersion</key>'
            echo '  <string>10.15</string>'
            echo '  <key>CFBundleIconFile</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>NSHighResolutionCapable</key>'
            echo '  <true/>'
            echo '</dict>'
            echo '</plist>'
          } > "Chronicle.app/Contents/Info.plist"
      - name: Create DMG
        run: |
          ln -sf /Applications "Chronicle.app/Contents/Applications"
          hdiutil create -volname "Chronicle" -srcfolder "Chronicle.app" \
            -ov -format UDZO "Chronicle.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: chronicle-macos-universal
          path: |
            Chronicle.dmg
            Chronicle.app

  # ---------------------------------------------------------------------------
  # Release — package & upload to GitHub Release on tag push
  # ---------------------------------------------------------------------------

  release-linux:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          deny-warnings: false

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            file

      - name: Build release
        run: cargo build --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - name: Build portable tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p chronicle-$VERSION-x86_64-linux
          cp target/release/chronicle chronicle-$VERSION-x86_64-linux/
          cp Chronicle.png chronicle-$VERSION-x86_64-linux/
          cp Chronicle.svg chronicle-$VERSION-x86_64-linux/
          tar czf chronicle-$VERSION-x86_64-linux.tar.gz chronicle-$VERSION-x86_64-linux/

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            chronicle-*.tar.gz
          fail_on_unmatched_files: false

  release-linux-rpm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          deny-warnings: false

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libxdo-dev \
            rpm \
            file

      - name: Build release
        run: cargo build --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Upload RPM
        uses: softprops/action-gh-release@v2
        with:
          files: target/generate-rpm/*.rpm
          fail_on_unmatched_files: false

  release-linux-appimage:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          deny-warnings: false

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libxdo-dev \
            file

      - name: Build release
        run: cargo build --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/icons/hicolor/64x64/apps \
                   AppDir/usr/share/icons/hicolor/scalable/apps \
                   AppDir/usr/share/applications
          cp target/release/chronicle AppDir/usr/bin/
          cp Chronicle.png AppDir/usr/share/icons/hicolor/64x64/apps/chronicle.png
          cp Chronicle.svg AppDir/usr/share/icons/hicolor/scalable/apps/chronicle.svg
          cat > AppDir/usr/share/applications/chronicle.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Chronicle
          Comment=小説執筆支援アプリケーション
          Exec=chronicle
          Icon=chronicle
          Type=Application
          Categories=Office;TextTools;
          Terminal=false
          DESKTOP
          ln -sf usr/share/applications/chronicle.desktop AppDir/
          ln -sf usr/share/icons/hicolor/64x64/apps/chronicle.png AppDir/.DirIcon
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          chmod +x linuxdeploy
          wget -q "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" -O linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh
          ./appimagetool AppDir "chronicle-$VERSION-x86_64.AppImage" 2>&1 || true
          ls -la chronicle-*.AppImage 2>/dev/null || true

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: chronicle-*.AppImage
          fail_on_unmatched_files: false

  release-macos-x86_64:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin
        env:
          GIT_TAG: ${{ github.ref_name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/chronicle

  release-macos-aarch64:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
        env:
          GIT_TAG: ${{ github.ref_name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/chronicle

  release-macos-universal:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [release-macos-x86_64, release-macos-aarch64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: chronicle-x86_64-apple-darwin
          path: build/x86_64
      - uses: actions/download-artifact@v4
        with:
          name: chronicle-aarch64-apple-darwin
          path: build/aarch64
      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create universal binary and .app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p "Chronicle.app/Contents/MacOS"
          mkdir -p "Chronicle.app/Contents/Resources"
          lipo -create build/x86_64/chronicle build/aarch64/chronicle \
            -output "Chronicle.app/Contents/MacOS/chronicle"
          chmod +x "Chronicle.app/Contents/MacOS/chronicle"
          cp Chronicle.png "Chronicle.app/Contents/Resources/"
      - name: Create Info.plist
        run: |
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>CFBundleExecutable</key>'
            echo '  <string>chronicle</string>'
            echo '  <key>CFBundleIdentifier</key>'
            echo '  <string>com.chronicle.app</string>'
            echo '  <key>CFBundleName</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>CFBundleDisplayName</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>CFBundleVersion</key>'
            echo '  <string>${{ github.ref_name }}</string>'
            echo '  <key>CFBundleShortVersionString</key>'
            echo '  <string>${{ steps.version.outputs.version }}</string>'
            echo '  <key>CFBundlePackageType</key>'
            echo '  <string>APPL</string>'
            echo '  <key>LSMinimumSystemVersion</key>'
            echo '  <string>10.15</string>'
            echo '  <key>CFBundleIconFile</key>'
            echo '  <string>Chronicle</string>'
            echo '  <key>NSHighResolutionCapable</key>'
            echo '  <true/>'
            echo '</dict>'
            echo '</plist>'
          } > "Chronicle.app/Contents/Info.plist"
      - name: Create DMG
        run: |
          ln -sf /Applications "Chronicle.app/Contents/Applications"
          VERSION="${{ steps.version.outputs.version }}"
          hdiutil create -volname "Chronicle" -srcfolder "Chronicle.app" \
            -ov -format UDZO "chronicle-$VERSION-macos-universal.dmg"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chronicle-*-macos-universal.dmg
          fail_on_unmatched_files: false

  release-windows:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          deny-warnings: false

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $v = "$env:GITHUB_REF_NAME" -replace '^v',''
          echo "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set version in Cargo.toml
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      - name: Build release
        run: cargo build --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --limit-output

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        run: |
          cargo wix init
          cargo wix

      - name: Build portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path target/release/chronicle.exe,Chronicle.png,Chronicle.svg -DestinationPath chronicle-$version-x86_64-windows.zip

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wix/*.msi
            chronicle-*.zip
          fail_on_unmatched_files: false

  release-android:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          deny-warnings: false

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libxdo-dev \
            file

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release
        run: cargo build --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Install dioxus-cli
        run: cargo install cargo-binstall && cargo binstall dioxus-cli@0.6.3 -y

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > chronicle.keystore

      - name: Build Android APK
        run: dx build --platform android --release
        env:
          GIT_TAG: ${{ github.ref_name }}

      - name: Inject Custom App Icons
        run: |
          convert Chronicle.png -resize 48x48 icon-48.png
          convert Chronicle.png -resize 72x72 icon-72.png
          convert Chronicle.png -resize 96x96 icon-96.png
          convert Chronicle.png -resize 144x144 icon-144.png
          convert Chronicle.png -resize 192x192 icon-192.png

          RES_DIR=$(find target/dx -name "res" -type d | grep "main" | head -1)
          if [ -z "$RES_DIR" ]; then
            echo "Error: target res directory not found!"
            exit 1
          fi
          echo "Found res directory at: $RES_DIR"

          cp icon-48.png "$RES_DIR/mipmap-mdpi/ic_launcher.png"
          cp icon-48.png "$RES_DIR/mipmap-mdpi/ic_launcher_round.png"
          cp icon-72.png "$RES_DIR/mipmap-hdpi/ic_launcher.png"
          cp icon-72.png "$RES_DIR/mipmap-hdpi/ic_launcher_round.png"
          cp icon-96.png "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
          cp icon-96.png "$RES_DIR/mipmap-xhdpi/ic_launcher_round.png"
          cp icon-144.png "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
          cp icon-144.png "$RES_DIR/mipmap-xxhdpi/ic_launcher_round.png"
          cp icon-192.png "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"
          cp icon-192.png "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"

          rm -rf "$RES_DIR/mipmap-anydpi-v26"

          GRADLEW=$(find target/dx -name "gradlew" -type f | head -1)
          if [ -z "$GRADLEW" ]; then
            echo "Error: gradlew not found!"
            exit 1
          fi
          echo "Found gradlew at: $GRADLEW"

          GRADLE_DIR=$(dirname "$GRADLEW")
          cd "$GRADLE_DIR"
          ./gradlew assembleDebug
          cd -

      - name: Sign Android APK
        run: |
          APK=$(find target/dx -name "app-debug.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found in target/dx"
            exit 1
          fi
          echo "Signing APK: $APK"
          zip -d "$APK" 'META-INF/*' 2>/dev/null || true
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ] && [ -n "$ANDROID_SDK_ROOT" ]; then
            APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            "$APKSIGNER" sign --ks chronicle.keystore \
              --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "$APK"
          else
            echo "apksigner not found, falling back to jarsigner (v1 only)"
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore chronicle.keystore \
              -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "$APK" \
              "${{ secrets.ANDROID_KEY_ALIAS }}"
          fi
          mv "$APK" target/dx/Chronicle-release.apk

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: target/dx/Chronicle-release.apk
          fail_on_unmatched_files: false
